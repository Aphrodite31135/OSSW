services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ossw-app
    environment:
      MODEL_BACKEND: hunyuan_api
      HUNYUAN3D_API_URL: http://hunyuan3d-api:8081/generate
      TEXT_TO_IMAGE_BACKEND: comfyui_api
      TEXT_TO_IMAGE_API_URL: http://text2image-api:3000/workflow/object_txt2img
      CUTOUT_BACKEND_ENABLED: "true"
      CUTOUT_API_URL: http://cutout-api:8091/cutout
      FALLBACK_TO_RELIEF: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      hunyuan3d-api:
        condition: service_healthy
      text2image-api:
        condition: service_healthy
      cutout-api:
        condition: service_healthy

  hunyuan3d-api:
    build:
      context: .
      dockerfile: hunyuan_backend/Dockerfile
    container_name: hunyuan3d-api
    environment:
      HUNYUAN_HOST: 0.0.0.0
      HUNYUAN_PORT: 8081
      HUNYUAN_DEVICE: cuda
      HUNYUAN_MODEL_PATH: tencent/Hunyuan3D-2
      HUNYUAN_SUBFOLDER: hunyuan3d-dit-v2-0-turbo
      HUNYUAN_OCTREE_RESOLUTION: 192
      HUNYUAN_NUM_INFERENCE_STEPS: 30
      HUNYUAN_GUIDANCE_SCALE: 5.5
    ports:
      - "8081:8081"
    volumes:
      - ./.hf-cache:/models/hf-cache
      - ./.u2net:/models/u2net
      - ./outputs/hunyuan-cache:/workspace/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    gpus: all

  text2image-api:
    build:
      context: .
      dockerfile: comfyui_custom/Dockerfile
    container_name: text2image-api
    environment:
      PORT: 3000
      COMFYUI_CHECKPOINT_NAME: SSD-1B-A1111.safetensors
      COMFYUI_CHECKPOINT_URL: https://huggingface.co/segmind/SSD-1B/resolve/main/SSD-1B-A1111.safetensors
    ports:
      - "8090:3000"
    volumes:
      - ./.hf-cache:/root/.cache/huggingface
      - ./.comfy-models:/opt/ComfyUI/models/checkpoints
      - ./outputs/comfyui-cache:/root/.cache/comfyui-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    gpus: all

  cutout-api:
    build:
      context: .
      dockerfile: cutout_backend/Dockerfile
    container_name: cutout-api
    environment:
      CUTOUT_MODEL: u2net
    ports:
      - "8091:8091"
    volumes:
      - ./.u2net:/models/u2net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 3m
